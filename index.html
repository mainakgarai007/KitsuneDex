<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KitsuneDex</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="container">

<!-- HERO -->
<div class="hero">

<img src="logo.png" class="logo">

<h1 class="title">KitsuneDex</h1>

<p class="subtitle">
Track Your Anime Universe
</p>

<div class="top-buttons">

<button class="glow-btn">
🏠 Home
</button>

<button class="glow-btn">
📺 My List
</button>

</div>

<div class="search-box">

<input type="text" placeholder="Search Anime">

<button>
Search
</button>

</div>

</div>

<!-- TRENDING -->
<div class="section-title">

<span>🔥 Trending Anime</span>

<span style="font-size:1rem;color:#60a5fa;">
View All
</span>

</div>

<div class="trending-grid">

<div class="trend-card">

<img src="https://cdn.myanimelist.net/images/anime/6/73245.jpg">

<div class="trend-info">

<h3>One Piece</h3>

<div class="rating">
⭐ 8.7
</div>

</div>

</div>

<div class="trend-card">

<img src="https://cdn.myanimelist.net/images/anime/13/17405.jpg">

<div class="trend-info">

<h3>Naruto</h3>

<div class="rating">
⭐ 8.3
</div>

</div>

</div>

<div class="trend-card">

<img src="https://cdn.myanimelist.net/images/anime/1286/99889.jpg">

<div class="trend-info">

<h3>Demon Slayer</h3>

<div class="rating">
⭐ 8.9
</div>

</div>

</div>

</div>

<!-- MY LIST -->
<div class="section-title">

<span>📺 My Anime List</span>

</div>

<!-- CARD -->
<div class="anime-card">

<img src="https://cdn.myanimelist.net/images/anime/13/17405.jpg">

<div class="anime-content">

<h2>Naruto</h2>

<div class="status">
Completed
</div>

<p>
Episode 220 / 220
</p>

<div class="progress">

<div class="progress-fill"></div>

</div>

<p>
📝 note diyechi
</p>

<div class="card-buttons">

<button class="small-btn">
Details
</button>

<button class="small-btn">
+ Episode
</button>

<button class="small-btn">
❤️
</button>

</div>

</div>

</div>

<!-- CARD -->
<div class="anime-card">

<img src="https://cdn.myanimelist.net/images/anime/1286/99889.jpg">

<div class="anime-content">

<h2>Demon Slayer</h2>

<div class="status">
Watching
</div>

<p>
Episode 15 / 26
</p>

<div class="progress">

<div class="progress-fill" style="width:58%"></div>

</div>

<p>
🔥 Swordsmith Arc
</p>

<div class="card-buttons">

<button class="small-btn">
Details
</button>

<button class="small-btn">
+ Episode
</button>

<button class="small-btn">
❤️
</button>

</div>

</div>

</div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">

<div class="nav-item active">
🏠<br>Home
</div>

<div class="nav-item">
🧭<br>Explore
</div>

<div class="nav-item">
📺<br>My List
</div>

<div class="nav-item">
👤<br>Profile
</div>

</div>

<script src="script.js"></script>

</body>
</html>
