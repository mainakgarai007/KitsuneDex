<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KitsuneDex</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <div class="logo-box">
      <img src="logo.png" alt="KitsuneDex Logo" class="logo">
    </div>

    <h1>KitsuneDex</h1>
    <p>Track Your Anime Universe</p>

    <div class="top-buttons">
      <button onclick="showHome()">🏠 Home</button>
      <button onclick="showMyList()">📺 My List</button>
    </div>
  </header>

  <main id="homePage">

    <section class="search-box">
      <input type="text" id="searchInput" placeholder="Search anime..." />
      <button onclick="searchAnime()">Search</button>
    </section>

    <div id="loading" class="loading hidden">
      🦊 Searching anime...
    </div>

    <div id="emptyState" class="empty-state hidden">
      No anime found 😭
    </div>

    <section class="quick-section">
      <h2>🔥 Trending Anime</h2>

      <div class="quick-buttons">
        <button onclick="quickSearch('One Piece')">One Piece</button>
        <button onclick="quickSearch('Naruto')">Naruto</button>
        <button onclick="quickSearch('Solo Leveling')">Solo Leveling</button>
        <button onclick="quickSearch('Jujutsu Kaisen')">JJK</button>
        <button onclick="quickSearch('Bleach')">Bleach</button>
      </div>
    </section>

    <section id="animeResults"></section>

  </main>

  <main id="myListPage" class="hidden">

    <section class="saved-section">
      <h2>📺 My Anime List</h2>
      <div id="savedAnime"></div>
    </section>

  </main>

  <div id="animeModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>

      <img id="modalImage" src="" alt="anime">

      <h2 id="modalTitle"></h2>

      <p id="modalScore"></p>
      <p id="modalEpisodes"></p>
      <p id="modalStatus"></p>
      <p id="modalGenres"></p>

      <div class="language-tags">
        <span>English</span>
        <span>Japanese</span>
        <span class="multi">Multi ▼</span>
      </div>

      <p id="modalSynopsis"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
